description: Plugins for building and deploying applications on Red Hat platforms.
summary: The rh-developer collection provides skills to detect projects, build images (S2I/Helm), deploy to OpenShift or RHEL,
  validate environments, and debug builds, pods, pipelines, networks, and hosts.
contents:
  description: |
    The pack provides 17 skills for developer workflows on OpenShift and RHEL, including two orchestration skills
    for end-to-end containerize-and-deploy and structured incident investigation.
  skills:
  - name: detect-project
    description: Project and runtime detection
    summary_markdown: |
      Analyze repositories and local trees to detect language, framework, and runtime signals.
      **Use when:**
      - "What language is this repo?"
      - "Scan my project for frameworks"
      - "Identify runtime from source"
      **What it does:**
      - Reads project files and optional GitHub context.
      - Summarizes stack signals for build and deploy skills.
  - name: recommend-image
    description: Image and builder recommendations
    summary_markdown: |
      Recommend S2I builder or base images aligned with Red Hat guidance.
      **Use when:**
      - "Which S2I image for Node?"
      - "Best UBI image for this app?"
      **What it does:**
      - Uses image selection criteria and builder catalog patterns.
      - Prepares inputs for `/s2i-build`.
  - name: s2i-build
    description: Source-to-image builds
    summary_markdown: |
      Build container images on OpenShift using S2I / BuildConfig flows.
      **Use when:**
      - "S2I build this repo"
      - "Create a BuildConfig"
      - "Build image from source"
      **What it does:**
      - Validates inputs, drives build logs, surfaces common build failures.
      - Pairs with `/debug-build` on failure.
  - name: deploy
    description: OpenShift deployment
    summary_markdown: |
      Deploy images to OpenShift with Deployment, Service, and Route.
      **Use when:**
      - "Deploy to OpenShift"
      - "Expose my app with a Route"
      **What it does:**
      - Generates manifests with approval gates.
      - Coordinates with cluster MCP safely.
  - name: helm-deploy
    description: Helm-based deployment
    summary_markdown: |
      Install or upgrade Helm charts on OpenShift.
      **Use when:**
      - "Helm install my chart"
      - "Upgrade release with new values"
      **What it does:**
      - Validates chart paths and values.
      - Reports release status and common Helm errors.
  - name: rhel-deploy
    description: RHEL / SSH deployment
    summary_markdown: |
      Deploy to standalone RHEL/Fedora hosts via SSH and systemd/Podman patterns.
      **Use when:**
      - "Deploy on RHEL over SSH"
      - "systemd unit for my container"
      **What it does:**
      - Uses SSH and host workflows from pack docs.
      - Optional Lightspeed context when configured.
  - name: validate-environment
    description: Environment validation
    summary_markdown: |
      Verify local tools and cluster connectivity before deploy or debug work.
      **Use when:**
      - "Check oc and helm"
      - "Validate my environment"
      **What it does:**
      - Checks binaries, kubeconfig reachability, and common misconfigurations.
  - name: debug-build
    description: OpenShift build diagnostics
    summary_markdown: |
      Diagnose BuildConfig / S2I / image build failures.
      **Use when:**
      - "Build failed on OpenShift"
      - "ImagePullBackOff during build"
      **What it does:**
      - Collects build logs and events.
      - Suggests fixes and retries with `/s2i-build`.
  - name: debug-pod
    description: Pod diagnostics
    summary_markdown: |
      Diagnose running pod failures on OpenShift.
      **Use when:**
      - "CrashLoopBackOff"
      - "Pod pending"
      - "OOMKilled pod"
      **What it does:**
      - Inspects status, events, current/previous logs.
      - Coordinates with `/debug-network` when needed.
  - name: debug-pipeline
    description: Tekton / pipeline diagnostics
    summary_markdown: |
      Diagnose PipelineRun and TaskRun failures.
      **Use when:**
      - "PipelineRun failed"
      - "Tekton step error"
      **What it does:**
      - Surfaces pipeline logs and workspace issues.
      - Guides toward green reruns.
  - name: debug-network
    description: Cluster networking diagnostics
    summary_markdown: |
      Diagnose Services, Routes, DNS, and NetworkPolicy issues.
      **Use when:**
      - "Service not reachable"
      - "Route returns 503"
      **What it does:**
      - Traces endpoints and policies.
      - Feeds back into `/deploy` verification.
  - name: debug-container
    description: Local container diagnostics
    summary_markdown: |
      Diagnose Podman/Docker local container failures.
      **Use when:**
      - "Container exits immediately locally"
      - "Cannot pull image locally"
      **What it does:**
      - Inspects local container state and logs.
      - Complements OpenShift debug skills.
  - name: debug-scc
    description: OpenShift SCC violation diagnostics
    summary_markdown: |
      Diagnose Security Context Constraint violations blocking pod creation on OpenShift.
      **Use when:**
      - "SCC violation"
      - "Pod blocked by security context constraint"
      - "FailedCreate forbidden"
      **What it does:**
      - Parses SCC rejection messages from ReplicaSet events.
      - Identifies non-compliant securityContext fields (runAsUser, capabilities, privilege escalation).
      - Checks ServiceAccount SCC bindings and suggests targeted fixes.
  - name: debug-rbac
    description: OpenShift RBAC diagnostics
    summary_markdown: |
      Diagnose RBAC permission failures causing 403 Forbidden errors on OpenShift.
      **Use when:**
      - "RBAC denied"
      - "403 forbidden in pod logs"
      - "Missing RoleBinding"
      **What it does:**
      - Analyzes pod logs for FORBIDDEN errors and readiness probe failures.
      - Identifies missing Role/RoleBinding for ServiceAccounts.
      - Detects regression patterns where bindings are repeatedly removed.
  - name: debug-rhel
    description: RHEL host diagnostics
    summary_markdown: |
      Diagnose systemd, SELinux, firewall, and resource issues on RHEL hosts.
      **Use when:**
      - "SELinux denial"
      - "systemd service failed on host"
      **What it does:**
      - Uses journal and policy signals.
      - Optional Lightspeed insights when available.
  orchestration_skills:
  - name: containerize-deploy
    description: End-to-end containerize and deploy
    summary_markdown: |
      Guided workflow from source to running application on OpenShift or RHEL with checkpoints.
      **Use when:**
      - "Deploy my app end to end"
      - "Take me from repo to running service"
      **What it does:**
      - Phase: detect project and target environment.
      - Phase: choose OpenShift (S2I / Helm / Podman) or RHEL path.
      - Invokes specialized skills with explicit user approvals between phases.
  - name: incident-triage
    description: Structured incident investigation and root cause analysis
    summary_markdown: |
      Investigate OpenShift incidents using Five Whys methodology, investigation guardrails, Prometheus metric analysis, and adversarial due diligence.
      **Use when:**
      - "Investigate this incident"
      - "Root cause analysis for this alert"
      - "Why is this failing? (complex/multi-resource)"
      - "Triage this outage"
      **What it does:**
      - Phase: gather incident context and route to specialized skill if single-resource.
      - Phase: hierarchical investigation across the Kubernetes ownership chain.
      - Phase: evidence collection with 5 investigation guardrails and Prometheus metrics.
      - Phase: Five Whys root cause analysis with remediation target identification.
      - Phase: 8-dimension adversarial due diligence with confidence scoring.
      - Chains to debug-pod, debug-scc, debug-rbac, debug-network for targeted fixes.
  skills_decision_guide:
  - user_request: '"Deploy to OpenShift" or "expose my image"'
    skill_to_use: deploy
    reason: Creates workload, Service, and Route with confirmation gates.
  - user_request: '"Helm install" or "upgrade my chart"'
    skill_to_use: helm-deploy
    reason: Helm-focused install/upgrade with values and release checks.
  - user_request: '"S2I build" or "BuildConfig from source"'
    skill_to_use: s2i-build
    reason: OpenShift-native build flow before `/deploy`.
  - user_request: '"From repo to running app" or "full deploy workflow"'
    skill_to_use: containerize-deploy
    reason: Orchestrates detect → strategy → deploy with checkpoints.
  - user_request: '"CrashLoopBackOff" or "pod not starting"'
    skill_to_use: debug-pod
    reason: Pod logs, events, and resource pressure analysis.
  - user_request: '"Build failed" or "S2I error"'
    skill_to_use: debug-build
    reason: Build logs and BuildConfig diagnosis.
  - user_request: '"Investigate this incident" or "root cause analysis" or "triage this alert"'
    skill_to_use: incident-triage
    reason: Multi-resource investigation with Five Whys, guardrails, and due diligence.
  - user_request: '"SCC violation" or "pod blocked by security context"'
    skill_to_use: debug-scc
    reason: Parses SCC rejection messages and identifies non-compliant security context fields.
  - user_request: '"RBAC denied" or "403 forbidden in pod logs"'
    skill_to_use: debug-rbac
    reason: Traces missing RoleBindings and ServiceAccount permissions.
  - user_request: '"Check my tools" or "validate cluster access"'
    skill_to_use: validate-environment
    reason: Pre-flight before deploy or heavy debug.
deploy_and_use: '#deploy_and_use.md'
documentation_section: '#documentation_section.md'
mcp_section: '#mcp_section.md'
