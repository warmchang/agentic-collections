sample_workflows:
- name: 'S2I path: detect → image → build → deploy'
  workflow: |
    User: "I have a Node app in this repo; put it on OpenShift"
    - `/detect-project` identifies the stack
    - `/recommend-image` picks a builder (optional)
    - `/s2i-build` creates the image
    - `/deploy` rolls out Deployment, Service, and Route with approval
- name: Helm install on cluster
  workflow: |
    User: "Install this Helm chart into namespace apps"
    - `/validate-environment` checks `oc`/`helm`
    - `/helm-deploy` installs or upgrades the chart and reports release status
- name: End-to-end with checkpoints
  workflow: |
    User: "Take my Python service from source to running on the cluster"
    - `/containerize-deploy` walks phases with confirmations between detect, strategy, and deploy steps
- name: Build failure then retry
  workflow: |
    User: "S2I build failed with ImagePullBackOff"
    - `/debug-build` gathers build and registry signals
    - User applies fix; `/s2i-build` retries with updated inputs
- name: Pod triage
  workflow: |
    User: "My pod keeps restarting"
    - `/debug-pod` inspects events and logs
    - If networking suspected, `/debug-network` narrows DNS/Route/Service issues
